databases:
  - name: kids-star-tracker-db
    plan: free
    databaseName: kids_star_tracker
    user: kids_star_tracker

services:
  - type: web
    name: kids-star-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kids-star-tracker-db
          property: connectionString
      - key: PREFERRED_URL_SCHEME
        value: https
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PARENT_EMAILS
        sync: false
