services:
  - type: web
    name: kids-star-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PREFERRED_URL_SCHEME
        value: https
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APP_BASE_URL
        value: https://kiddostars.uk
      - key: GOOGLE_REDIRECT_URI
        value: https://kiddostars.uk/auth/google/callback
      - key: SEED_DEMO_DATA
        value: "false"
