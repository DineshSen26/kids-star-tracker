{% extends "layout.html" %}
{% block content %}
<div class="login-shell">
    <div class="panel login-panel">
        <h2>Parent Login</h2>
        <p class="text-muted">Sign in with email or Google.</p>
        <form method="post" class="vstack gap-3 mb-3">
            <input class="form-control form-control-lg" type="email" name="email" placeholder="Email" required autofocus>
            <input class="form-control form-control-lg" type="password" name="password" placeholder="Password" required>
            <button class="btn btn-primary btn-lg rounded-pill"><i class="fa-solid fa-lock"></i> Login</button>
        </form>
        {% if google_login_enabled %}
        <p class="text-center text-muted small">or</p>
        <a class="btn btn-light btn-lg rounded-pill google-btn w-100" href="{{ url_for('main.google_login') }}">
            <i class="fa-brands fa-google"></i> Continue with Google
        </a>
        {% endif %}
        <p class="text-center mt-3 mb-0">
            <a href="{{ url_for('main.register') }}">Create an account</a>
        </p>
        <p class="text-center mt-2 mb-0 small text-muted">
            <a href="{{ url_for('main.about') }}">About</a> ·
            <a href="{{ url_for('main.how_to_use') }}">How to Use</a>
        </p>
    </div>
</div>
{% endblock %}
