{% extends "layout.html" %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-6">
        <div class="panel">
            <h2>Edit {{ kid.name }}</h2>
            <form method="post" class="vstack gap-3">
                <input class="form-control form-control-lg" name="name" value="{{ kid.name }}" required>
                <input class="form-control form-control-lg" name="age" type="number" min="1" max="18" value="{{ kid.age or '' }}" placeholder="Age (optional)">
                <select class="form-select form-select-lg" name="avatar">
                    {% for icon in avatar_choices %}
                    <option value="{{ icon }}" {% if kid.avatar == icon %}selected{% endif %}>{{ icon.split(' ')[-1]|replace('fa-', '')|title }}</option>
                    {% endfor %}
                </select>
                <hr>
                <h3 class="section-mini">Child Login</h3>
                <label class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="child_login_enabled" {% if kid.child_login_enabled %}checked{% endif %}>
                    <span class="form-check-label">Require PIN for task page</span>
                </label>
                <input class="form-control form-control-lg" type="password" name="pin" placeholder="New PIN (4–6 digits)" inputmode="numeric" pattern="\d{4,6}" maxlength="6">
                <p class="text-muted small mb-0">Leave PIN blank to keep the current one. Set a PIN before enabling login.</p>
                <button class="btn btn-primary btn-lg rounded-pill"><i class="fa-solid fa-floppy-disk"></i> Save</button>
            </form>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="panel">
            <h2>Quick Links</h2>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-outline-primary rounded-pill" href="{{ url_for('main.child_page', kid_id=kid.id) }}">Open task page</a>
                <a class="btn btn-outline-secondary rounded-pill" href="{{ url_for('main.kids') }}">Back to kids</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
