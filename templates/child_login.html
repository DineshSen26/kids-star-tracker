{% extends "layout.html" %}
{% block content %}
<div class="login-shell">
    <div class="panel login-panel">
        <div class="avatar mb-3"><i class="{{ kid.avatar }}"></i></div>
        <h2>Hi {{ kid.name }}!</h2>
        <p class="text-muted">Enter your PIN to see your tasks.</p>
        <form method="post" class="vstack gap-3">
            <input class="form-control form-control-lg text-center" type="password" name="pin" placeholder="PIN" inputmode="numeric" pattern="\d{4,6}" maxlength="6" required autofocus>
            <button class="btn btn-primary btn-lg rounded-pill"><i class="fa-solid fa-star"></i> Go</button>
        </form>
    </div>
</div>
{% endblock %}
