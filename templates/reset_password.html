{% extends "layout.html" %}
{% block content %}
<div class="login-shell">
    <div class="panel login-panel">
        <h2>Reset Password</h2>
        <p class="text-muted">Choose a new password for your account.</p>
        <form method="post" class="vstack gap-3 mb-3">
            <input class="form-control form-control-lg" type="password" name="password" placeholder="New password (min 6 chars)" required minlength="6" autofocus>
            <input class="form-control form-control-lg" type="password" name="confirm_password" placeholder="Confirm new password" required minlength="6">
            <button class="btn btn-primary btn-lg rounded-pill"><i class="fa-solid fa-key"></i> Update Password</button>
        </form>
        <p class="text-center mt-3 mb-0">
            <a href="{{ url_for('main.login') }}">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
