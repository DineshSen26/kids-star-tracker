{% extends "layout.html" %}
{% block content %}
<div class="login-shell">
    <div class="panel login-panel">
        <h2>Forgot Password</h2>
        <p class="text-muted">Enter your email and we will send you a reset link.</p>
        <form method="post" class="vstack gap-3 mb-3">
            <input class="form-control form-control-lg" type="email" name="email" placeholder="Email" required autofocus>
            <button class="btn btn-primary btn-lg rounded-pill"><i class="fa-solid fa-envelope"></i> Send Reset Link</button>
        </form>
        <p class="text-center mt-3 mb-0">
            <a href="{{ url_for('main.login') }}">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
